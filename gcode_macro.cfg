[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    UPDATE_DELAYED_GCODE ID=motor_check_timer DURATION=0
    UPDATE_DELAYED_GCODE ID=motor_off_timer DURATION=0

    {% set z = params.Z|default(5)|int %}
    
    {% if printer['pause_resume'].is_paused|int == 0 %}     
        SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=zhop VALUE={z}
        SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=etemp VALUE={printer['extruder'].target}
        SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=efan VALUE={printer["fan_generic cooling_fan"].speed *255}
        SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=echambertemp VALUE={printer['heater_generic chamber'].target}

        DISABLE_ALL_SENSOR
        {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] and printer.save_variables.variables.enable_box == 1 %}
            BUFFER_MONITORING ENABLE=0 
        {% endif %}
        SAVE_GCODE_STATE NAME=PAUSE              
        BASE_PAUSE
        {% if printer.extruder.can_extrude %}
            G92 E0
            G1 E-2 F800
        {% endif %}
        {% if "z" in printer.toolhead.homed_axes and (printer.gcode_move.position.z + z ) < printer['gcode_macro PRINTER_PARAM'].max_z_position %}
            G91
            G1 Z{z} F900
        {% else %}
            SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=zhop VALUE=0
        {% endif %}
        SAVE_GCODE_STATE NAME=PAUSEPARK
        {% if "xy"  in printer.toolhead.homed_axes %}
            G90
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F9000
            G1 Y{printer['gcode_macro PRINTER_PARAM'].clear_y_position} F9000
        {% endif %}

        {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] and printer.save_variables.variables.enable_box == 1 %}
        {% else %}
            CUT_FILAMENT_1
            MOVE_TO_TRASH
            G92 E0
            G1 E-23 F800
        {% endif %}

        M104 S0
        SET_IDLE_TIMEOUT TIMEOUT=172800
        SET_STEPPER_ENABLE STEPPER=extruder enable=0
        {% set slot_sync = printer.save_variables.variables.slot_sync|default("slot-1") %}
        {% if printer['box_stepper ' ~ slot_sync] %}
            SET_STEPPER_ENABLE STEPPER='box_stepper '{slot_sync} enable=0
        {% endif %}
    {% endif %}

    BEEP I=2 DUR=50





[gcode_macro RESUME_PRINT]
variable_zhop: 0
variable_etemp: 0
variable_efan: 0
variable_echambertemp: 0
gcode:
    {% set tool_change = params.TOOL_CHANGE|default(0)|int %}
    
    
    {% if printer['pause_resume'].is_paused|int == 1 %}
        {% if printer.save_variables.variables.box_count >= 1 and printer.save_variables.variables.enable_box == 1 and printer.save_variables.variables.is_tool_change == 1 and printer["box_extras"]%}
            SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}
            MOVE_TO_TRASH
            {% if etemp > 0 %}
                M109 S{etemp|int}
            {% endif %}
            M83
            RESTORE_GCODE_STATE NAME=PAUSEPARK MOVE=1 MOVE_SPEED=200                            
            RESTORE_GCODE_STATE NAME=PAUSE MOVE=1 MOVE_SPEED=15
            BASE_RESUME
        {% else %}
            SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}
            {% if etemp > 0 %}
                M109 S{etemp|int}
            {% endif %}
            {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] %} 
                SAVE_VARIABLE VARIABLE=retry_step VALUE=None
            {% endif %}
            M83              
            M106 S{efan}
            {% if echambertemp > 0 %}
                M141 S{echambertemp|int}
            {% endif %}
            G1 X{printer['gcode_macro PRINTER_PARAM'].clear_x_position} F9000
            G1 Y{printer['gcode_macro PRINTER_PARAM'].clear_y_position} F9000
            {% if printer.save_variables.variables.box_count >= 1 and printer.save_variables.variables.enable_box == 1 %} 
                BUFFER_MONITORING ENABLE=1
            {% else %}                 
                G91
                G1 E90 F800
                G90
            {% endif %}
            M106 S255

            G1 X99 F200
            G1 X85 F200
            G1 X99 F200
            G1 X85 F200

            G1 X116 F5000
            G1 X100 F5000
            G1 X116 F5000
            G1 X100 F5000
            G1 X125 F15000

            M106 S{efan}
            
            RESTORE_GCODE_STATE NAME=PAUSEPARK MOVE=1 MOVE_SPEED=200                            
            RESTORE_GCODE_STATE NAME=PAUSE MOVE=1 MOVE_SPEED=15
            BASE_RESUME       
            {% if tool_change == 0 %}
                ENABLE_ALL_SENSOR
            {% endif %}    
        {% endif %}
    {% endif %}
    

[gcode_macro RESUME]
rename_existing: BASE_RESUME
variable_zhop: 0
variable_etemp: 0
variable_efan: 0
variable_echambertemp: 0
gcode:
    {% if printer['pause_resume'].is_paused|int == 1 %}
        {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] %} 
            {% if printer.save_variables.variables.enable_box == 1 %}
                TRY_RESUME_PRINT
            {% else %}
                {% if printer['filament_switch_sensor filament_switch_sensor'].filament_detected == True %}
                    RESUME_PRINT
                {% else %}
                    M118 Please load filament
                    BEEP I=1 DUR=400
                {% endif %}
            {% endif %}
        {% else %}
            {% if printer['filament_switch_sensor filament_switch_sensor'].filament_detected == True %}
                RESUME_PRINT
            {% else %}
                M118 Please load filament
                BEEP I=1 DUR=400
            {% endif %}
        {% endif %}
    {% endif %}

[gcode_macro RESUME_1]
gcode:
    {% set extruder_temp = params.EXTRUDER|default(240)|int %}
    {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] %} 
        {% if printer.save_variables.variables.enable_box == 1 %}
            RESUME_PRINT_1 S={extruder_temp}
        {% else %}
            {% if printer['filament_switch_sensor filament_switch_sensor'].filament_detected == False %}
                M118 Please load filament
                BEEP I=1 DUR=400
            {% endif %}
        {% endif %}
    {% else %}
        {% if printer['filament_switch_sensor filament_switch_sensor'].filament_detected == False %}
            M118 Please load filament
            BEEP I=1 DUR=400
        {% endif %}
    {% endif %}





[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
    MOTOR_RESET_TIMER
    SAVE_GCODE_STATE NAME=CANCEL_STATE
        
    {% if printer.print_stats.state != "cancelled" %}

        {% if printer.extruder.temperature <= 174 %}
            M104 S0
            M140 S0
            M141 S0
            M106 S0
            M106 P2 S0
            M106 P3 S0
            M106 P4 S0
            
            G28

            MOVE_TO_TRASH
            G1 X99 F8000
            G1 X101 Y282 F8000

            BED_MESH_CLEAR
            CLEAR_PAUSE

            M220 S100
            M221 S100

            BEEP I=1 DUR=400

            BASE_CANCEL_PRINT
            
            SET_IDLE_TIMEOUT TIMEOUT=1
            G4 P1000
            
            RESTORE_GCODE_STATE NAME=CANCEL_STATE
            CLEAR_LAST_FILE
            M118 Canceled print!
            
        {% elif printer.extruder.temperature >174 and printer.extruder.temperature < 200 %}
            M104 S0
            M106 S255
            
            M140 S0
            M141 S0
            M106 P2 S0
            M106 P3 S0
            M106 P4 S0

            G91
            G1 Z5 F800
            G90

            MOVE_TO_TRASH
            G1 X99 F8000
            G1 X101 Y282 F8000

            BED_MESH_CLEAR
            CLEAR_PAUSE

            M220 S100
            M221 S100
            M106 S0

            BEEP I=1 DUR=400

            BASE_CANCEL_PRINT
            
            SET_IDLE_TIMEOUT TIMEOUT=1
            G4 P1000
            
            RESTORE_GCODE_STATE NAME=CANCEL_STATE
            CLEAR_LAST_FILE
            M118 Canceled print!

        {% else %}
            M106 S255    
            G92 E0
            G1 E-1 F800
            M104 S182
            
            M140 S0
            M141 S0
            M106 P2 S0
            M106 P3 S0
            M106 P4 S0

            {% set z = printer.gcode_move.position.z|float %}
            {% if z < 90 %}
                G1 Z125 F1000
            {% elif z < 150 %}
                G1 Z185 F1000
            {% elif z < 210 %}
                G1 Z245 F1000
            {% elif z < 245 %}
                G1 Z250 F1000
            {% endif %}

            CUT_FILAMENT_1
            MOVE_TO_TRASH
            G1 X99 F8000
            G1 X101 Y282 F8000

            {% if printer.save_variables.variables.box_count >= 1 and printer.save_variables.variables.enable_box == 1 %} 
            {% else %}                 
                G92 E0
                G1 E-21.5 F800
            {% endif %}
            
            M106 S0
            M104 S0
            
            BED_MESH_CLEAR
            CLEAR_PAUSE

            M220 S100
            M221 S100

            BEEP I=1 DUR=400

            BASE_CANCEL_PRINT
            
            SET_IDLE_TIMEOUT TIMEOUT=1
            G4 P1000
            
            RESTORE_GCODE_STATE NAME=CANCEL_STATE
            CLEAR_LAST_FILE
            M118 Canceled print!
        {% endif %}
    {% endif %}





[gcode_macro PRINT_END]
gcode:
    SAVE_GCODE_STATE NAME=PRINT_END_STATE
    
    M106 P3 S62
    G92 E0
    G1 E-1 F300
    M106 S0
    M106 P4 S0 
    M400
    
    {% if printer.gcode_move.position.z|float < 90 %}
        G1 Z125 F1000
    {% elif printer.gcode_move.position.z|float < 150 %}
        G1 Z185 F1000
    {% elif printer.gcode_move.position.z|float < 210 %}
        G1 Z245 F1000
    {% elif printer.gcode_move.position.z|float < 245 %}
        G1 Z250 F1000
    {% else %}
        G1 Z250 F400
    {% endif %}
    
    CUT_FILAMENT_1
    MOVE_TO_TRASH
    G1 X99 F8000
    G1 X101 Y282 F8000

    {% if printer.save_variables.variables.box_count >= 1 and printer.save_variables.variables.enable_box == 1 %} 
    {% else %}                 
        G92 E0
        G1 E-21.5 F800
    {% endif %}
    
    save_zoffset
    SET_IDLE_TIMEOUT TIMEOUT=172800
    CLEAR_PAUSE

    M106 P2 S0
    DISABLE_BOX_HEATER
    
    M104 S0
    
    {% set fast_end = printer.save_variables.variables.fast_end_mode|default(0)|int %}
    {% if fast_end == 1 %}
        FAST_END
    {% else %}
        LONG_END
    {% endif %}

    G4 P1000
   
    RESTORE_GCODE_STATE NAME=PRINT_END_STATE
    
    M220 S100
    M221 S100
    
    DISABLE_ALL_SENSOR
    BED_MESH_CLEAR
    G31
    CLEAR_LAST_FILE
    SDCARD_RESET_FILE

    M106 P3 S0

    BEEP I=3 DUR=200
    
    MOTOR_RESET_TIMER


[gcode_macro FAST_END]
gcode:
    SET_HEATER_TEMPERATURE HEATER="heater_bed" TARGET=0
    SET_HEATER_TEMPERATURE HEATER="chamber" TARGET=0


[gcode_macro LONG_END]
gcode:
    M118 Code:QDE Пожалуйста, дождитесь остывания принтера!
    {% set saved_temp = printer.save_variables.variables.last_chamber_target|default(0)|int %}
    
    {% if saved_temp > 0 %}
        M141 S{saved_temp}
        M140 S{saved_temp + 8}
        TEMPERATURE_WAIT SENSOR="heater_bed" MAXIMUM={saved_temp + 10}
    {% endif %}
    
    M140 S0
    M141 S0
    M118 Code:QDE Дождитесь остывания стола до 40 градусов!




