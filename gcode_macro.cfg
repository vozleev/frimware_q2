gcode:
    {% if params.S is defined %}
        {% set s = params.S|float %}
    {% endif %}
    {% if params.P is defined %}
    {% if params.T is defined %}
        {% set s = [params.P|float ,params.T|float] | min %}
    {% endif %}
    {% endif %}

    SET_VELOCITY_LIMIT ACCEL={s}
    SET_VELOCITY_LIMIT ACCEL_TO_DECEL={s/2}


[gcode_macro BEEP]
gcode:
    {% set i = params.I|default(1)|int %}
    {% set dur = params.DUR|default(100)|int %}
    {% set beep = printer.save_variables.variables.beep|default(0) %}

    {% if beep == 1 %}
        {% for iteration in range(i|int) %}
            SET_PIN PIN=beeper VALUE=1
            G4 P{dur}
            SET_PIN PIN=beeper VALUE=0
            G4 P{dur}
        {% endfor %}
    {% endif %}





#Датчик наличия филамента


[gcode_macro CHECK_FILAMENT]
gcode:
    {% if printer['filament_switch_sensor filament_switch_sensor'].filament_detected == False %}
        RESPOND TYPE=error MSG="No filament detected when starting printing!"
        DISABLE_ALL_SENSOR
        BEEP I=1 DUR=400
        BASE_CANCEL_PRINT
    {% endif %}


[gcode_macro ENABLE_ALL_SENSOR]
gcode:
    SET_FILAMENT_SENSOR SENSOR=filament_switch_sensor ENABLE=1


[gcode_macro DISABLE_ALL_SENSOR]
gcode:
    SET_FILAMENT_SENSOR SENSOR=filament_switch_sensor ENABLE=0





#Автодом


[gcode_macro _HOME_X]
gcode:
    {% set HOME_CUR = 0.9 %}
    {% set driver_config = printer.configfile.settings['tmc2240 stepper_x'] %}
    {% set RUN_CUR = driver_config.run_current %}
    
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CUR} 
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CUR} 
    G28 X
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CUR}     
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CUR}   
    G91    
    G1 X-10 F3000
    G90


[gcode_macro _HOME_Y]
gcode:
    {% set HOME_CUR = 0.9 %}
    {% set driver_config = printer.configfile.settings['tmc2240 stepper_x'] %}
    {% set RUN_CUR = driver_config.run_current %}
    
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CUR} 
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CUR} 
    G28 Y
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CUR}     
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CUR}   
    G91    
    G1 Y10 F3000
    G90    


[gcode_macro _HOME_XY]
gcode:   
    _HOME_Y
    _HOME_X
    _HOME_Y


[gcode_macro _CG28]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}


[homing_override]
axes:xy
gcode:
    M204 S10000
    M220 S100
    SET_STEPPER_ENABLE STEPPER=extruder enable=0
    
    SET_PIN PIN=caselight VALUE=1
    SET_GCODE_VARIABLE MACRO=LOGIC_CONFIG VARIABLE=motors_on VALUE=1
    {% set logic = printer.save_variables.variables.motor_logic_enabled|default(1)|int %}
    {% if logic == 1 %}
        UPDATE_DELAYED_GCODE ID=motor_off_timer DURATION=0
    {% endif %}
    
    {% if 'X' in params and 'Y' not in params %}
        _HOME_X
    {% endif %}

    {% if 'Y' in params and 'X' not in params %}
        _HOME_Y
    {% endif %}

    {% if 'X' in params and 'Y' in params %}
        _HOME_XY
    {% endif %}

    {% if 'X' not in params and  'Y' not in params  %}
        SET_KINEMATIC_POSITION X=100
        SET_KINEMATIC_POSITION Y=100
        SET_KINEMATIC_POSITION Z={printer.toolhead.axis_maximum.z/2}
        G91
        G1 Z5 F600
        G4 P2000
        _HOME_XY
        G90
        G1 X{printer['gcode_macro PRINTER_PARAM'].max_x_position/2} Y{printer['gcode_macro PRINTER_PARAM'].max_y_position/2} F7800
        G91
        M400       
        G28 Z
        G1 Z20 F600
    {% endif %}

    M204 S10000   
    G90
    
    {% set logic = printer.save_variables.variables.motor_logic_enabled|default(1)|int %}
    {% set print_state = printer.print_stats.state %}
    {% if logic == 1 and print_state not in ["printing", "paused"] %}
        {% set cur_x = printer.toolhead.position.x|float %}
        {% set cur_y = printer.toolhead.position.y|float %}
        {% set cur_z = printer.toolhead.position.z|float %}
        {% set cur_e = printer.toolhead.position.e|float %}
        SET_GCODE_VARIABLE MACRO=LOGIC_CONFIG VARIABLE=last_x VALUE={cur_x}
        SET_GCODE_VARIABLE MACRO=LOGIC_CONFIG VARIABLE=last_y VALUE={cur_y}
        SET_GCODE_VARIABLE MACRO=LOGIC_CONFIG VARIABLE=last_z VALUE={cur_z}
        SET_GCODE_VARIABLE MACRO=LOGIC_CONFIG VARIABLE=last_e VALUE={cur_e}
        {% set delay = printer['gcode_macro LOGIC_CONFIG'].motor_off_delay %}
        UPDATE_DELAYED_GCODE ID=motor_off_timer DURATION={delay}
        {% set interval = printer['gcode_macro LOGIC_CONFIG'].motor_check_interval %}
        UPDATE_DELAYED_GCODE ID=motor_check_timer DURATION={interval}
    {% endif %}


[gcode_macro save_zoffset]
gcode:
    pass


[gcode_macro set_zoffset]        
gcode:
    pass



