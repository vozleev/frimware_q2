    {% if needs_homing %}
        G28 Z
    {% endif %}
    Z_TILT_ADJUST


[gcode_macro G29]
variable_k:1
gcode:
    BED_MESH_CLEAR
    SET_STEPPER_ENABLE STEPPER=extruder enable=0
    {% if k|int==1 %}
        G28   
        BED_MESH_CALIBRATE PROFILE=kamp       
        SAVE_VARIABLE VARIABLE=profile_name VALUE='"kamp"'
        G4 P5000
        SAVE_CONFIG_QD 
    {% else %}
        {% if printer["bed_mesh"].profiles.default %}
            G28
            BED_MESH_PROFILE LOAD=default
            SAVE_VARIABLE VARIABLE=profile_name VALUE='"default"'
        {% else %}
            G28
            BED_MESH_CALIBRATE PROFILE=default
            SAVE_VARIABLE VARIABLE=profile_name VALUE='"default"'
            G4 P5000
            SAVE_CONFIG_QD
        {% endif %}
    {% endif %}


[gcode_macro CUSTOM_G29]
variable_k: 1
variable_force_home: 0
gcode:
    {% set k = params.K|default(k)|int %}
    {% set force_home = params.FORCE_HOME|default(force_home)|int %}
    BED_MESH_CLEAR
    SET_STEPPER_ENABLE STEPPER=extruder enable=0
    {% set needs_homing = (force_home == 1 or printer.toolhead.homed_axes != 'xyz') %}
    {% if needs_homing %}
        G28
    {% else %}
        G91
        G1 Z5 F1200
        G90
    {% endif %}
    EXCLUDE_OBJECT_CLEAR
    {% if k == 1 %}
        BED_MESH_CALIBRATE PROFILE=kamp
        SAVE_VARIABLE VARIABLE=profile_name VALUE='"kamp"'
    {% else %}
        {% if printer["bed_mesh"].profiles.default is defined %}
            BED_MESH_PROFILE LOAD=default
            SAVE_VARIABLE VARIABLE=profile_name VALUE='"default"'
        {% else %}
            BED_MESH_CALIBRATE PROFILE=default
            SAVE_VARIABLE VARIABLE=profile_name VALUE='"default"'
        {% endif %}
    {% endif %}
    G1 X{printer.toolhead.axis_maximum.x / 2} Y{printer.toolhead.axis_maximum.y / 2} F6000





