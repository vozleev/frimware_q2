[gcode_macro M603]
description: filament unload
gcode:
    DISABLE_ALL_SENSOR
    M104 S182
    {% if printer.toolhead.homed_axes != 'xy' %}
        G28 XY
    {% endif %}
    M118 Heat up complete
    M109 S182
    CUT_FILAMENT_1
    G1 E-22.5 F800
    MOVE_TO_TRASH

    {% if printer.save_variables.variables.box_count > 0 and printer["box_extras"] %}
        E_UNLOAD SLOT=16
    {% endif %}
    G1 X99 F8000
    G1 X101 Y282 F8000
    
    M104 S0
    M118 Unload finish
    BEEP I=2 DUR=50


[gcode_macro M604]
gcode:
    DISABLE_ALL_SENSOR
    M106 P3 S127
    
    {% set high_temp = printer.save_variables.variables.high_temp_mode|default(0)|int %}
    {% if high_temp == 1 %}
        M104 S300
    {% else %}
        M104 S265
    {% endif %}

    {% set mode = params.T|default(0)|int %}
    {% if "xy" not in printer.toolhead.homed_axes %}
        G28 X Y
    {% endif %}

    MOVE_TO_TRASH

    {% if printer.save_variables.variables.box_count > 0 and mode == 0 and printer["box_extras"]%}
        M118 check box filament
        E_LOAD SLOT=16 S={hotendtemp}
    {% endif %}

    {% if high_temp == 1 %}
        M109 S300
    {% else %}
        M109 S265
    {% endif %}

    G92 E0
    G1 E100 F600
    M400
    M106 S255
    
    {% if high_temp == 1 %}
        M104 S250
    {% else %}
        M104 S220
    {% endif %}

    G1 X99 F300
    G1 X85 F300
    G1 X99 F300
    G1 X85 F300
    G1 X99 F20000
    G1 X85 F20000

    G1 X116 F5000
    G1 X100 F5000
    G1 X116 F5000
    G1 X100 F5000
    G1 X125 F5000
    G1 Y260 F5000
    MOVE_TO_TRASH
   
    G1 X99 F8000
    G1 X101 Y282 F8000

    M106 P3 S0
    M106 S0

    M118 Load finish
    BEEP I=2 DUR=50





