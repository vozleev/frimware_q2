#Конфигурация


[gcode_macro LOGIC_CONFIG]
#Таймер автоматизации
variable_motor_off_delay: 600          # Таймер для моторов (в секундах)
variable_motor_check_interval: 1       # Интервал проверки движения (в секундах)

#Не трогать!
variable_last_x: -999.0
variable_last_y: -999.0
variable_last_z: -999.0
variable_last_e: -999.0
variable_motors_on: 0

#PREHEAT настройки
variable_preheat_bed_temp: 120         # Температура стола при предварительном нагреве
variable_preheat_chamber_temp: 65      # Температура камеры при предварительном нагреве
variable_preheat_hotend_temp: 140      # Температура сопла при предварительном нагреве (для ускорения процесса и конвекции)
variable_preheat_timer1: 200           # Таймер до 1го сигнала (сек)
variable_preheat_timer2: 200           # Таймер до 2го сигнала (сек)
variable_preheat_timer3: 200           # Таймер до окончательного выключения (сек)
gcode:





#Запуск принтера


[delayed_gcode PRINTER_INIT]
initial_duration: 0.2
gcode:
    SET_STEPPER_ENABLE STEPPER=stepper_z enable=1
    SET_STEPPER_ENABLE STEPPER=stepper_z1 enable=1
    BED_MESH_CLEAR
    DISABLE_ALL_SENSOR
    INIT_ALL_VARS
#   DETECT_INTERRUPTION


[gcode_macro INIT_ALL_VARS]
gcode:
    {% set sv = printer.save_variables.variables %}

    {% if 'last_chamber_target' not in sv %}
        SAVE_VARIABLE VARIABLE=last_chamber_target VALUE=0
    {% endif %}

    {% if 'fix_step' not in sv %}
        SAVE_VARIABLE VARIABLE=fix_step VALUE=0
    {% endif %}
    {% if 'fix_target_temp' not in sv %}
        SAVE_VARIABLE VARIABLE=fix_target_temp VALUE=55
    {% endif %}
    {% if 'fix_chamber_temp' not in sv %}
        SAVE_VARIABLE VARIABLE=fix_chamber_temp VALUE=65
    {% endif %}
    {% if 'fix_active' not in sv %}
        SAVE_VARIABLE VARIABLE=fix_active VALUE=0
    {% endif %}
    {% if 'fix_mode' not in sv %}
        SAVE_VARIABLE VARIABLE=fix_mode VALUE="''"
    {% endif %}
    {% if 'fix_soak_time' not in sv %}
        SAVE_VARIABLE VARIABLE=fix_soak_time VALUE=2700
    {% endif %}
    {% if 'fix_start_time' not in sv %}
        SAVE_VARIABLE VARIABLE=fix_start_time VALUE=0
    {% endif %}

    {% if 'preheat_step' not in sv %}
        SAVE_VARIABLE VARIABLE=preheat_step VALUE=0
    {% endif %}
    {% if 'preheat_start_time' not in sv %}
        SAVE_VARIABLE VARIABLE=preheat_start_time VALUE=0
    {% endif %}

    {% if 'motor_logic_enabled' not in sv %}
        SAVE_VARIABLE VARIABLE=motor_logic_enabled VALUE=1
    {% endif %}
    
    {% if 'just_ended_print' not in sv %}
        SAVE_VARIABLE VARIABLE=just_ended_print VALUE=0
    {% endif %}

    {% if 'high_temp_mode' not in sv %}
        SAVE_VARIABLE VARIABLE=high_temp_mode VALUE=0
    {% endif %}

    {% if 'fast_end_mode' not in sv %}
        SAVE_VARIABLE VARIABLE=fast_end_mode VALUE=0
    {% endif %}

    {% if 'preheat_bed_temp' not in sv %}
        SAVE_VARIABLE VARIABLE=preheat_bed_temp VALUE={printer['gcode_macro LOGIC_CONFIG'].preheat_bed_temp|default(120)}
    {% endif %}
    {% if 'preheat_chamber_temp' not in sv %}
        SAVE_VARIABLE VARIABLE=preheat_chamber_temp VALUE={printer['gcode_macro LOGIC_CONFIG'].preheat_chamber_temp|default(65)}
    {% endif %}
    {% if 'preheat_hotend_temp' not in sv %}
        SAVE_VARIABLE VARIABLE=preheat_hotend_temp VALUE={printer['gcode_macro LOGIC_CONFIG'].preheat_hotend_temp|default(140)}
    {% endif %}
    {% if 'preheat_timer1' not in sv %}
        SAVE_VARIABLE VARIABLE=preheat_timer1 VALUE={printer['gcode_macro LOGIC_CONFIG'].preheat_timer1|default(200)}
    {% endif %}
    {% if 'preheat_timer2' not in sv %}
        SAVE_VARIABLE VARIABLE=preheat_timer2 VALUE={printer['gcode_macro LOGIC_CONFIG'].preheat_timer2|default(200)}
    {% endif %}
    {% if 'preheat_timer3' not in sv %}
        SAVE_VARIABLE VARIABLE=preheat_timer3 VALUE={printer['gcode_macro LOGIC_CONFIG'].preheat_timer3|default(200)}
    {% endif %}

    {% set logic = printer.save_variables.variables.motor_logic_enabled|default(1)|int %}
    {% if logic == 1 %}
        SET_GCODE_VARIABLE MACRO=LOGIC_CONFIG VARIABLE=motors_on VALUE=1
        SET_PIN PIN=caselight VALUE=1
        {% set delay = printer['gcode_macro LOGIC_CONFIG'].motor_off_delay %}
        UPDATE_DELAYED_GCODE ID=motor_off_timer DURATION={delay}
        {% set interval = printer['gcode_macro LOGIC_CONFIG'].motor_check_interval %}
        UPDATE_DELAYED_GCODE ID=motor_check_timer DURATION={interval}
    {% endif %}





#Восстановлене после потери питания


[gcode_macro DETECT_INTERRUPTION]
gcode:
    {% set was_interrupted = printer.save_variables.variables.was_interrupted %}
    {% if was_interrupted %}
    BEEP I=1 DUR=400
    M118 Detected unexpected interruption during the last print. Do you want to resume printing? (Do not move the extruder before resuming.)
    M118 Yes: RESUME_INTERRUPTED
    M118 No: CLEAR_LAST_FILE
    {% endif %}


[gcode_macro CLEAR_NOZZLE_PLR]
gcode:
    {% set chambertemp = params.CHAMBER|default(0)|int %}
    {% if chambertemp > 0 %}
        SET_HEATER_TEMPERATURE HEATER="chamber" TARGET={chambertemp}
    {% endif %}
    {% set bedtemp = params.BED|default(90)|int %}
    M140 S{bedtemp}
    {% set hotendtemp = params.HOTEND|default(250)|int %}
    {% set part_fan = params.PART_FAN|default(0)|float %}
    {% set aux_fan = params.AUX_FAN|default(0)|float %}

    MOVE_TO_TRASH

    G92 E0
    G1 E100 F600
    M400
    M106 S255
    
    G1 X99 F200
    G1 X85 F200
    G1 X99 F200
    G1 X85 F200

    M106 S0

    G1 X116 F5000
    G1 X99 F5000
    G1 X116 F5000
    G1 X99 F5000
    G1 X125 F5000

    G1 X99 F8000
    G1 X101 Y282 F8000
    
    {% if chambertemp > 0 %}
        TEMPERATURE_WAIT SENSOR="heater_generic chamber" MINIMUM={chambertemp}
    {% endif %}
    M190 S{bedtemp}
    M109 S{hotendtemp}
    M106 S{part_fan}
    M106 P2 S{aux_fan}





#Околопечатные макросы


[gcode_macro PRINT_START]
gcode:
    UPDATE_DELAYED_GCODE ID=motor_check_timer DURATION=0
    UPDATE_DELAYED_GCODE ID=motor_off_timer DURATION=0
    SET_PIN PIN=caselight VALUE=1
    
    BEEP I=1 DUR=50

    M104 S170
    ENABLE_ALL_SENSOR

    {% if printer.save_variables.variables.box_count >= 1 and printer.save_variables.variables.enable_box == 1 %} 
    {% else %}                 
        CHECK_FILAMENT
    {% endif %}

    DISABLE_ALL_SENSOR
    CLEAR_PAUSE

    {% set bedtemp = params.get('BED') | int %}
    {% set hotendtemp = params.get('HOTEND') | int %}
    {% set chambertemp = params.get('CHAMBER', 0) | int %}
    {% set extruder = params.EXTRUDER|default(0)|int %}
    {% set Polar_cooler = printer.save_variables.variables.enable_polar_cooler|default(0) %}

    SAVE_VARIABLE VARIABLE=last_chamber_target VALUE={chambertemp}
    
    M140 S{bedtemp}
    M141 S{chambertemp}

    {% if chambertemp > 0 %}
        M106 S63 P2
    {% endif %}

    TEMPERATURE_WAIT SENSOR=extruder MINIMUM=100
    G28
    Z=0 MOVE=0

    M141 S{chambertemp}

    MOVE_TO_TRASH
    
    {% set high_temp = printer.save_variables.variables.high_temp_mode|default(0)|int %}
    {% if high_temp == 1 %}
        BUFFER_MONITORING ENABLE=0
        {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] %} 
            SAVE_VARIABLE VARIABLE=load_retry_num VALUE=0
            SAVE_VARIABLE VARIABLE=retry_step VALUE=None
            {% for i in range(16) %}
                SAVE_VARIABLE VARIABLE=runout_{i} VALUE=0
                G4 P100
            {% endfor %}
            {% if printer.save_variables.variables.enable_box == 1 %}
                BOX_PRINT_START EXTRUDER={extruder} HOTENDTEMP={300}
                M400
            {% endif %}
        {% endif %}
    {% else %}
        BUFFER_MONITORING ENABLE=0
        {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] %} 
            SAVE_VARIABLE VARIABLE=load_retry_num VALUE=0
            SAVE_VARIABLE VARIABLE=retry_step VALUE=None
            {% for i in range(16) %}
                SAVE_VARIABLE VARIABLE=runout_{i} VALUE=0
                G4 P100
            {% endfor %}
            {% if printer.save_variables.variables.enable_box == 1 %}
                BOX_PRINT_START EXTRUDER={extruder} HOTENDTEMP={265}
                M400
            {% endif %}
        {% endif %}
    {% endif %}
     
    CLEAR_NOZZLE
    M141 S{chambertemp}

    M109 S170
    M106 S0

    G1 X135 Y135 F20000

#    M190 S{bedtemp}

    M141 S{chambertemp}

    G28 Z

    M141 S{chambertemp}

    CUSTOM_Z_TILT

    M141 S{chambertemp}

    CUSTOM_G29

    G1 X148 Y0 F20000
    G1 Z0 F600

    M190 S{bedtemp}

    {% if printer.save_variables.variables.box_count >= 1 and printer["box_extras"] and printer.save_variables.variables.enable_box == 1 %}
        BUFFER_MONITORING ENABLE=1 
    {% endif %}

    M191 S{chambertemp}
    M106 P2 S0
    M109 S{hotendtemp}
    M106 P4 S{Polar_cooler}

    set_zoffset
    ENABLE_ALL_SENSOR
    save_last_file






[gcode_macro CUT_FILAMENT_1]
gcode:
    {% set needs_homing = printer.toolhead.homed_axes != 'xyz' %}
    SET_STEPPER_ENABLE STEPPER=extruder enable=0
    {% if needs_homing %}
        G28 XY
    {% endif %}
    {% if (printer.gcode_move.position.y) > 260 %}
         G1 Y260 F20000
    {% endif %}
    {% if (printer.gcode_move.position.x) < 15 %}
         G1 X15 F20000
    {% endif %}

    G1 X15 Y5 F20000
    G1 X1 F8000
    M400
    G1 X-0.5 F100
    M400
    G1 X1 F8000
    M400
    G1 X-0.5 F300
    M400
    G1 X15 F20000





[gcode_macro MOVE_TO_TRASH]
gcode:
    {% if "xy" not in printer.toolhead.homed_axes %}
        G28 X Y
    {% endif %}
    M204 S5000
    {% if (printer.gcode_move.position.y) > 270 %}
        {% if (printer.gcode_move.position.x) > 112 or (printer.gcode_move.position.x) < 85 %}
            G1 X85 Y270 F20000
            G1 Y287.5 F6000
        {% endif %}
        G1 X85 F20000
        G1 Y287.5 F3000
    {% else %}
        G1 X85 Y260 F20000
        G1 Y287.5 F6000
    {% endif %}





