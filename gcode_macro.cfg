#Таймеры

[gcode_macro MOTOR_RESET_TIMER]
gcode:
    {% set logic = printer.save_variables.variables.motor_logic_enabled|default(1)|int %}
    
    {% if logic == 1 %}
        {% set print_state = printer.print_stats.state %}
        {% if print_state not in ["printing", "paused"] %}
            {% set cur_x = printer.toolhead.position.x|float %}
            {% set cur_y = printer.toolhead.position.y|float %}
            {% set cur_z = printer.toolhead.position.z|float %}
            {% set cur_e = printer.toolhead.position.e|float %}
            
            SET_GCODE_VARIABLE MACRO=LOGIC_CONFIG VARIABLE=last_x VALUE={cur_x}
            SET_GCODE_VARIABLE MACRO=LOGIC_CONFIG VARIABLE=last_y VALUE={cur_y}
            SET_GCODE_VARIABLE MACRO=LOGIC_CONFIG VARIABLE=last_z VALUE={cur_z}
            SET_GCODE_VARIABLE MACRO=LOGIC_CONFIG VARIABLE=last_e VALUE={cur_e}
            SET_GCODE_VARIABLE MACRO=LOGIC_CONFIG VARIABLE=motors_on VALUE=1
            
            {% set delay = printer['gcode_macro LOGIC_CONFIG'].motor_off_delay %}
            UPDATE_DELAYED_GCODE ID=motor_off_timer DURATION={delay}
            {% set interval = printer['gcode_macro LOGIC_CONFIG'].motor_check_interval %}
            UPDATE_DELAYED_GCODE ID=motor_check_timer DURATION={interval}
        {% endif %}
    {% endif %}





[delayed_gcode motor_check_timer]
initial_duration: 0
gcode:
    {% set logic = printer.save_variables.variables.motor_logic_enabled|default(1)|int %}
    {% set print_state = printer.print_stats.state %}
    {% set interval = printer['gcode_macro LOGIC_CONFIG'].motor_check_interval %}
    
    {% if logic == 0 or print_state in ["printing", "paused"] %}
        UPDATE_DELAYED_GCODE ID=motor_check_timer DURATION=0
        UPDATE_DELAYED_GCODE ID=motor_off_timer DURATION=0
    {% else %}
        {% set cfg = printer['gcode_macro LOGIC_CONFIG'] %}
        {% set cur_x = printer.toolhead.position.x|float %}
        {% set cur_y = printer.toolhead.position.y|float %}
        {% set cur_z = printer.toolhead.position.z|float %}
        {% set cur_e = printer.toolhead.position.e|float %}
        
        {% set moved = ((cur_x - cfg.last_x)|abs > 0.01) or
                       ((cur_y - cfg.last_y)|abs > 0.01) or
                       ((cur_z - cfg.last_z)|abs > 0.01) or
                       ((cur_e - cfg.last_e)|abs > 0.01) %}
        
        {% if moved %}
            SET_GCODE_VARIABLE MACRO=LOGIC_CONFIG VARIABLE=last_x VALUE={cur_x}
            SET_GCODE_VARIABLE MACRO=LOGIC_CONFIG VARIABLE=last_y VALUE={cur_y}
            SET_GCODE_VARIABLE MACRO=LOGIC_CONFIG VARIABLE=last_z VALUE={cur_z}
            SET_GCODE_VARIABLE MACRO=LOGIC_CONFIG VARIABLE=last_e VALUE={cur_e}
            SET_GCODE_VARIABLE MACRO=LOGIC_CONFIG VARIABLE=motors_on VALUE=1
            SET_PIN PIN=caselight VALUE=1
            {% set delay = cfg.motor_off_delay %}
            UPDATE_DELAYED_GCODE ID=motor_off_timer DURATION={delay}
        {% endif %}
        
        UPDATE_DELAYED_GCODE ID=motor_check_timer DURATION={interval}
    {% endif %}





[delayed_gcode motor_off_timer]
initial_duration: 0
gcode:
    {% set logic = printer.save_variables.variables.motor_logic_enabled|default(1)|int %}
    {% set print_state = printer.print_stats.state %}
    {% set motors_on = printer['gcode_macro LOGIC_CONFIG'].motors_on|int %}
    
    {% if logic == 1 and print_state not in ["printing", "paused"] %}
        SET_PIN PIN=caselight VALUE=0
        
        {% if motors_on == 1 %}
            M84.1
            SET_GCODE_VARIABLE MACRO=LOGIC_CONFIG VARIABLE=motors_on VALUE=0
        {% endif %}
    {% endif %}
    
    UPDATE_DELAYED_GCODE ID=motor_off_timer DURATION=0





[delayed_gcode fix_process]
initial_duration: 0
gcode:
    {% set active = printer.save_variables.variables.fix_active|default(0)|int %}
    {% set step = printer.save_variables.variables.fix_step|default(0)|int %}

    {% if active == 1 and step != 0 %}
        {% set target         = printer.save_variables.variables.fix_target_temp|default(65)|int %}
        {% set soak           = printer.save_variables.variables.fix_soak_time|default(2700)|int %}
        {% set chamber_target = printer.save_variables.variables.fix_chamber_temp|default(65)|int %}

        {% set bed_temp    = printer.heater_bed.temperature|float %}
        {% set chamber_temp = printer["heater_generic chamber"].temperature|float %}

        {% set timeout_sec = 4800 %}

        {% if step == 1 %}
            M141 S{chamber_target}
            M140 S{target}
            SAVE_VARIABLE VARIABLE=fix_step VALUE=2
            SAVE_VARIABLE VARIABLE=fix_start_time VALUE={printer.toolhead.estimated_print_time|default(0)}
            M118 Code:QDE Начало нагрева: стол {target}°C, камера {chamber_target}°C
            UPDATE_DELAYED_GCODE ID=fix_process DURATION=30

        {% elif step == 2 %}
            {% set time_passed = printer.toolhead.estimated_print_time|default(0) - printer.save_variables.variables.fix_start_time|default(0) %}
            {% set bed_ok     = bed_temp     >= (target - 1) %}
            {% set chamber_ok = chamber_temp >= (chamber_target - 1) %}
            {% if bed_ok and chamber_ok or time_passed > timeout_sec %}
                M118 Code:QDE Принтер нагрет. Началась выдержка.
                SAVE_VARIABLE VARIABLE=fix_step VALUE=3
                UPDATE_DELAYED_GCODE ID=fix_process DURATION={soak}
            {% else %}
                UPDATE_DELAYED_GCODE ID=fix_process DURATION=30
            {% endif %}

        {% elif step == 3 %}
            M118 Code:QDE Выдержка завершена. Началось плавное охлаждение. Не открывайте дверцу!
            SAVE_VARIABLE VARIABLE=fix_step VALUE=4
            UPDATE_DELAYED_GCODE ID=fix_process DURATION=1

        {% elif step >= 4 and step < 61 %}
            {% set cd = step - 3 %}
            {% set phase1_steps = ((target - 68) // 2) + 1 %}

            {% if cd <= phase1_steps %}
                {% set subtract = cd * 2 %}
                {% set bed_t = target - subtract %}
                {% if bed_t < 68 %}{% set bed_t = 68 %}{% endif %}
                M140 S{bed_t}
                M141 S{chamber_target}
                {% set next_step = step + 1 %}
                SAVE_VARIABLE VARIABLE=fix_step VALUE={next_step}
                UPDATE_DELAYED_GCODE ID=fix_process DURATION=300

            {% else %}
                {% set joint_steps = cd - phase1_steps %}
                {% set bed_t = 66 - joint_steps * 2 %}
                {% set chamber_t = 63 - joint_steps * 2 %}

                {% if bed_t < 40 %}{% set bed_t = 40 %}{% endif %}
                {% if chamber_t < 40 %}{% set chamber_t = 40 %}{% endif %}

                M140 S{bed_t}
                M141 S{chamber_t}

                {% if bed_t <= 40 %}
                    SAVE_VARIABLE VARIABLE=fix_step VALUE=61
                    UPDATE_DELAYED_GCODE ID=fix_process DURATION=600
                {% else %}
                    {% set next_step = step + 1 %}
                    SAVE_VARIABLE VARIABLE=fix_step VALUE={next_step}
                    UPDATE_DELAYED_GCODE ID=fix_process DURATION=300
                {% endif %}
            {% endif %}

        {% elif step == 61 %}
            M140 S40
            M141 S40
            SAVE_VARIABLE VARIABLE=fix_step VALUE=62
            UPDATE_DELAYED_GCODE ID=fix_process DURATION=300

        {% elif step == 62 %}
            M140 S0
            M141 S0
            SAVE_VARIABLE VARIABLE=fix_active VALUE=0
            SAVE_VARIABLE VARIABLE=fix_step VALUE=0
            UPDATE_DELAYED_GCODE ID=fix_process DURATION=600
            BEEP I=2 DUR=400
            M118 Code:QDE Отжиг завершён. Дождитесь естественного остывания модели.
        {% endif %}
    {% endif %}





[delayed_gcode preheat_process]
initial_duration: 0
gcode:
    {% set step = printer.save_variables.variables.preheat_step|default(0)|int %}

    {% if step != 0 %}
        {% set bed_temp    = printer.heater_bed.temperature|float %}
        {% set chamber_temp = printer["heater_generic chamber"].temperature|float %}
        {% set hotend_temp  = printer.extruder.temperature|float %}
        {% set target_bed   = printer.save_variables.variables.preheat_bed_temp|default(120) %}
        {% set target_chamber = printer.save_variables.variables.preheat_chamber_temp|default(65) %}
        {% set target_hotend = printer.save_variables.variables.preheat_hotend_temp|default(140) %}
        {% set timer1 = printer.save_variables.variables.preheat_timer1|default(200) %}
        {% set timer2 = printer.save_variables.variables.preheat_timer2|default(200) %}
        {% set timer3 = printer.save_variables.variables.preheat_timer3|default(200) %}
        
        {% set start_time = printer.save_variables.variables.preheat_start_time|default(0) %}
        {% set now = printer.toolhead.estimated_print_time|default(0) %}
        {% set time_passed = now - start_time %}

        {% set timeout_sec = 2700 %}

        {% if step == 1 %}
            {% set bed_ok     = bed_temp     >= target_bed %}
            {% set chamber_ok = chamber_temp >= target_chamber %}
            {% set hotend_ok  = hotend_temp  >= target_hotend %}
            {% if bed_ok and chamber_ok and hotend_ok or time_passed > timeout_sec %}
                M118 Code:QDE Принтер нагрел стол до {target_bed}°C, камеру до {target_chamber}°C и сопло до {target_hotend}°C!
                BEEP I=2 DUR=50
                SAVE_VARIABLE VARIABLE=preheat_step VALUE=2
                UPDATE_DELAYED_GCODE ID=preheat_process DURATION={timer1}
            {% else %}
                UPDATE_DELAYED_GCODE ID=preheat_process DURATION=30
            {% endif %}

        {% elif step == 2 %}
            BEEP I=2 DUR=100
            SAVE_VARIABLE VARIABLE=preheat_step VALUE=3
            UPDATE_DELAYED_GCODE ID=preheat_process DURATION={timer2}

        {% elif step == 3 %}
            BEEP I=2 DUR=200
            SAVE_VARIABLE VARIABLE=preheat_step VALUE=4
            UPDATE_DELAYED_GCODE ID=preheat_process DURATION={timer3}

        {% elif step == 4 %}
            BEEP I=2 DUR=400
            M141 S0
            M140 S0
            M104 S0
            M106 P2 S0
            M118 Code:QDE Преднагрев завершён!
            SAVE_VARIABLE VARIABLE=preheat_step VALUE=0

        {% endif %}
    {% endif %}





